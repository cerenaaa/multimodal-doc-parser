name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install anthropic pytest numpy
      - run: python -c "from parsers.base_parser import BaseDocumentParser; print('base parser OK')"
      - run: python -c "from parsers.invoice_parser import InvoiceParser; p=InvoiceParser(); assert 'invoice_number' in p._extraction_prompt(); print('invoice OK')"
